<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CURSO ALEJANDRO - TRACTO</title>
    <p>Created By Gus</p>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos básicos para la imagen */
        .trailer-image img {
            max-width: 3rem; 
            height: auto;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col items-center justify-center min-h-screen p-4">

    <header class="text-center mb-1">
        <div class="trailer-image flex justify-center items-center mb-4">
            <img src="https://png.pngtree.com/png-vector/20240603/ourmid/pngtree-semi-truck-truck-trailer-png-image_12611330.png" alt="Icono de Tráiler" class="w-12 h-12 object-contain">
        </div>
        
        <h1 class="text-5xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-600">
            CURSO ALEJANDRO - TRACTO
        </h1>
    </header>

    <div class="video-container grid grid-cols-1 md:grid-cols-2 gap-8 max-w-6xl w-full">
        
        <div class="bg-gray-800 rounded-lg shadow-xl overflow-hidden transform hover:scale-105 transition-transform duration-300">
            <video 
                controls 
                class="w-full h-auto rounded-t-lg" 
                poster="">
                
                <source 
                    src="https://huggingface.co/datasets/darkred06/alexcurso/resolve/main/video%201.mp4" 
                    type="video/mp4">
                
                Tu navegador no soporta la reproducción de video.
            </video>
            <div class="p-4">
                <p class="text-lg font-semibold text-gray-200">PRIMER VIDEO</p>
            </div>
        </div>

        <div class="bg-gray-800 rounded-lg shadow-xl overflow-hidden transform hover:scale-105 transition-transform duration-300">
            <video 
                controls 
                class="w-full h-auto rounded-t-lg" 
                poster="">
                
                <source 
                    src="https://huggingface.co/datasets/darkred06/alexcurso/resolve/main/video%202.mp4?download=true" 
                    type="video/mp4">
                
                Tu navegador no soporta la reproducción de video.
            </video>
            <div class="p-4">
                <p class="text-lg font-semibold text-gray-200">SEGUNDO VIDEO</p>
            </div>
        </div>
    </div>


<p>pagina backup</p>

    
</body>
</html>
